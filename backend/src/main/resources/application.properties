spring.application.name=printxpress-backend

# Server port (Cloud Run / App Hosting sets PORT automatically)
server.port=${PORT:8080}

# Seeds a few sample products on startup if the Firestore "products" collection is empty.
# Safe to leave true: it only adds data when the collection is empty.
# Set to false in production if you want to disable seeding.
app.seed-data=${SEED_DATA:true}
